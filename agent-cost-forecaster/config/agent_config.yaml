agent:
  agent_version: "mvp-0.1"
  provider: "anthropic"
  # Use Haiku for batch logging (cheap). Switch to claude-sonnet-4-6 to profile your real workload.
  model: "claude-haiku-4-5-20251001"
  system_prompt: >
    You are a helpful assistant. Use tools only when necessary.
    For questions requiring current data or external facts, use web_search.
    For arithmetic, use calculator. Do not estimate numbers — look them up or calculate them.
  temperature: 0
  max_tool_calls: 5
  max_tokens: 4096

tools:
  - name: "web_search"
    enabled: true
    description: "Search the web for current or external information."
  - name: "calculator"
    enabled: true
    description: "Evaluate arithmetic expressions."

truncation:
  # Maximum characters to insert from a single tool result into the context window.
  tool_result_max_chars: 4000

budget:
  max_task_cost_usd_p90: 0.02
  max_batch_cost_usd: 2.00

privacy:
  mode: "synthetic_only"
