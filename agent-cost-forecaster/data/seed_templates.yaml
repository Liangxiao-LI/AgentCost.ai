# Seed prompt templates for Milestone 1 batch runs.
#
# Distribution follows the architecture spec:
#   web_search_required : 40 tasks  (profile search result sizes)
#   calculator_required : 20 tasks  (profile deterministic tool behavior)
#   no_tool_required    : 25 tasks  (test false positive suppression)
#   ambiguous           : 15 tasks  (test router robustness)
#
# Run `acf generate-tasks --n 3` to expand these into data/seed_tasks.jsonl
# (3 expansions × 40 templates ≈ 120 tasks before dedup).

# ── web_search required ──────────────────────────────────────────────────────
web_search_required:
  target_tools: ["web_search"]
  templates:
    - "Find the latest {company} quarterly revenue."
    - "What is the current stock price of {ticker}?"
    - "Search for the most recent {company} earnings report."
    - "Find recent news about {company}."
    - "What is the current UK inflation rate?"
    - "Find the latest US GDP growth rate."
    - "What is the current federal funds rate?"
    - "Search for the latest {company} annual report highlights."
    - "Find the most recent {ticker} analyst price target."
    - "What did {company} report for revenue last quarter?"
    - "Search for {company} CEO recent statements."
    - "Find the latest unemployment rate in the United States."
    - "What is {company}'s current market capitalisation?"
    - "Search for the latest {company} product launch news."

# ── calculator required ──────────────────────────────────────────────────────
calculator_required:
  target_tools: ["calculator"]
  templates:
    - "Calculate the percentage return from {start} to {end}."
    - "What is {a} percent of {b}?"
    - "Calculate CAGR from {start} to {end} over {years} years."
    - "If I invest {b} at {a}% annual return for {years} years, what is the final value?"
    - "What is the ratio of {end} to {start} expressed as a percentage?"
    - "Calculate ({end} minus {start}) divided by {start} times 100."

# ── no_tool required ─────────────────────────────────────────────────────────
no_tool_required:
  target_tools: []
  templates:
    - "Explain what duration means in bond investing."
    - "Explain the Black-Litterman model intuitively."
    - "What is the difference between variance and standard deviation?"
    - "Explain what a yield curve inversion means for the economy."
    - "What does EBITDA stand for and why do investors use it?"
    - "Explain the difference between a stock split and a reverse split."
    - "What is the capital asset pricing model (CAPM)?"
    - "Explain what a P/E ratio measures."
    - "What is the difference between gross profit and net profit?"
    - "Explain what 'free cash flow' means in simple terms."

# ── ambiguous ────────────────────────────────────────────────────────────────
ambiguous:
  target_tools: []
  templates:
    - "Tell me about {company}."
    - "What do you know about {ticker}?"
    - "Explain how a web search engine works."
    - "When should an agent use a calculator tool?"
    - "What are the risks of relying on external tools for financial data?"
    - "Should I trust AI-generated financial analysis?"

# ── Variable substitution values ─────────────────────────────────────────────
variables:
  company: ["Nvidia", "Apple", "Microsoft", "Tesla", "Amazon", "Google"]
  ticker: ["NVDA", "AAPL", "MSFT", "TSLA", "AMZN", "GOOGL"]
  start: [100, 250, 58, 1000]
  end: [120, 310, 73, 1350]
  years: [1, 3, 5, 10]
  a: [15, 22, 40, 7]
  b: [200, 1000, 2500, 500]
